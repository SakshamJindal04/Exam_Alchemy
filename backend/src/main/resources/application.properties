# Server Configuration
server.port=8080

# MongoDB Database Connection
# Uses environment variable in production, falls back to localhost for development
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/examalchemy}

# JWT Configuration
# IMPORTANT: Set JWT_SECRET as an environment variable in production!
# Generate a secure random key: openssl rand -hex 32
jwt.secret=${JWT_SECRET:dev-only-secret-do-not-use-in-production-needs-to-be-at-least-64-characters-long}

# JWT Expiration Time (in milliseconds)
# 86400000ms = 24 hours
jwt.expiration=${JWT_EXPIRATION:86400000}