services:
  - type: web
    name: exam-alchemy-api
    region: singapore
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false  # Set this value as a secret in the Render dashboard
      - key: JWT_SECRET
        sync: false  # Set this value as a secret in the Render dashboard


  - type: web
    name: exam-alchemy-app
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build || echo 'No build step'"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /api/:path*
        destination: https://exam-alchemy-api.onrender.com/api/:path*
      - type: rewrite
        source: /*
        destination: /index.html



